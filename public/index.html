<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreRH - Sistema de Gestão</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <h1>CoreRH</h1>
            </div>
            <nav class="menu">
                <ul>
                    <li><a href="#" data-menu="usuarios" class="menu-item active">👥 Usuários</a></li>
                </ul>
            </nav>

            <!-- Perfil do Usuário -->
            <div class="user-profile">
                <div class="user-avatar">
                    <img src="https://via.placeholder.com/50" alt="Usuário">
                </div>
                <div class="user-info">
                    <p class="user-name">Admin</p>
                    <p class="user-role">Administrador</p>
                </div>
            </div>
        </aside>

        <!-- Conteúdo Principal -->
        <main class="main-content">
            <!-- Usuários -->
            <section id="usuarios" class="content-section active">
                <div class="section-header">
                    <h2>Gestão de Usuários</h2>
                    <button class="btn btn-primary" onclick="abrirModalNovoUsuario()">Novo Usuário</button>
                </div>
                <div class="table-container">
                    <table class="users-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nome</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="usuarios-tbody">
                            <tr>
                                <td colspan="3" class="text-center">Carregando...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <!-- Modal Novo Usuário -->
    <div id="modalNovoUsuario" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Novo Usuário</h3>
                <button class="btn-close" onclick="fecharModalNovoUsuario()">&times;</button>
            </div>
            <form id="formNovoUsuario" class="form">
                <div class="form-group">
                    <label for="nome">Nome de Usuário</label>
                    <input type="text" id="nome" name="nome" placeholder="João Silva" required>
                </div>
                <div class="form-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha" placeholder="Senha segura" required>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="fecharModalNovoUsuario()">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Criar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
